<aside class="right-panel expanded" id="right-panel" aria-label="SQL Assistant">

  <div class="assistant-tab-bar" role="toolbar" aria-label="SQL Assistant controls">
    <span class="assistant-tab active" aria-current="true">SQL ASSISTANT</span>
  </div>

  <div class="assistant-subheader">
    <button class="assistant-subheader-btn" title="History" aria-label="Chat history">🕐</button>
    <button class="assistant-subheader-btn" title="New chat" aria-label="New chat">＋</button>
    <span class="assistant-model-label">GitHub Models · gpt-4o</span>
  </div>

  <div class="schema-context-bar">
    <span class="schema-ctx-label">CONTEXT</span>
    <span class="schema-chip active-chip">ecommerce_demo</span>
    <span class="schema-chip">orders</span>
    <span class="schema-chip">customers</span>
    <span class="schema-chip">products</span>
  </div>

  <div class="assistant-body" id="assistant-body">

    <!-- SQL ASSISTANT panel (default) -->
    <div class="assistant-panel active" id="atab-sql">
      <div class="assistant-welcome">
        <h3>SQL Assistant</h3>
        <p>Quick highlights from PgStudio’s README, including editor-tab and multi-tab assistant workflows.</p>
      </div>

      <div class="action-cards action-cards-product">
        <button class="action-card" data-open="readme" data-product-highlight="secure-connections">
          <span class="action-card-icon">🔌</span>
          <strong>Secure Connections</strong>
          <span>VS Code SecretStorage encryption</span>
        </button>
        <button class="action-card" data-open="readme" data-product-highlight="connection-safety">
          <span class="action-card-icon">🛡️</span>
          <strong>Connection Safety</strong>
          <span>DEV / STAGE / PROD, read-only, risk scoring</span>
        </button>
        <button class="action-card" data-open="readme" data-product-highlight="sql-notebooks">
          <span class="action-card-icon">📓</span>
          <strong>SQL Notebooks</strong>
          <span>Interactive notebooks with AI assistance</span>
        </button>
        <button class="action-card" data-open="readme" data-product-highlight="ai-powered">
          <span class="action-card-icon">🤖</span>
          <strong>AI-Powered</strong>
          <span>Generate, optimize, explain, analyze, and work across multiple assistant tabs</span>
        </button>
        <button class="action-card" data-open="readme" data-product-highlight="visual-tools">
          <span class="action-card-icon">🎨</span>
          <strong>Visual Tools</strong>
          <span>Table designer, schema diff, ERD workflows</span>
        </button>
        <button class="action-card" data-open="readme" data-product-highlight="quick-start">
          <span class="action-card-icon">🚀</span>
          <strong>Quick Start</strong>
          <span>Install and start in 2 minutes</span>
        </button>
      </div>

      <div class="snippet-section">
        <div class="snippet-label">SQL SNIPPETS</div>
        <div class="snippet-pills">
          <button class="snippet-pill" data-snippet="INNER JOIN ... ON ... = ...">INNER_JOIN</button>
          <button class="snippet-pill" data-snippet="WITH cte AS (&#10;  SELECT ...&#10;)&#10;SELECT * FROM cte;">WITH
            cte AS</button>
          <button class="snippet-pill"
            data-snippet="ROW_NUMBER() OVER (PARTITION BY ... ORDER BY ...)">ROW_NUMBER()</button>
          <button class="snippet-pill" data-snippet="EXPLAIN ANALYZE">EXPLAIN ANALYZE</button>
          <button class="snippet-pill" data-snippet="ON CONFLICT (id) DO UPDATE SET col = EXCLUDED.col">ON
            CONFLICT</button>
          <button class="snippet-pill" data-snippet="jsonb_agg(row_to_json(t)) FROM t">jsonb_agg</button>
        </div>
      </div>

      <div class="assistant-chat-log" id="sql-chat-log"></div>
    </div>

  </div><!-- /assistant-body -->

  <div class="assistant-input-area" style="position: relative;">
    <textarea id="assistant-input" placeholder="Ask anything postgres/SQL... (@ to refer a table/function)" rows="2"
      aria-label="Ask SQL Assistant"></textarea>
    <div class="input-toolbar">
      <button class="input-tool-btn" id="btn-attach" title="Attach file" aria-label="Attach file">📎</button>
      <button class="input-tool-btn" title="Attach image" aria-label="Attach image">🖼️</button>
      <button class="input-tool-btn" title="Reference table or function" aria-label="Reference">@</button>
      <button class="input-send-btn" id="assistant-send" aria-label="Send message">Send ›</button>
    </div>

    <!-- Quick Context Menu -->
    <div class="chat-attach-menu" id="chat-attach-menu" aria-hidden="true">
      <div class="chat-attach-header">SELECT CONTEXT</div>
      <div class="chat-attach-group">
        <span class="conn-dot"></span> demo_db
      </div>
      <button class="attach-menu-item" data-ctx="public.orders"><span class="attach-icon">⊞</span>
        public.orders</button>
      <button class="attach-menu-item" data-ctx="public.customers"><span class="attach-icon">⊞</span>
        public.customers</button>
      <button class="attach-menu-item" data-ctx="public.products"><span class="attach-icon">⊞</span>
        public.products</button>
      <button class="attach-menu-item" data-ctx="sales.daily_revenue"><span class="attach-icon">⊞</span>
        sales.daily_revenue</button>
    </div>
  </div>

</aside><!-- /right-panel -->
