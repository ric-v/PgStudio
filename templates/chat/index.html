<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="{{CSP}}">
  <title>PostgreSQL Chat</title>
  <link rel="stylesheet" href="{{HIGHLIGHT_CSS_URI}}">
  <script src="{{MARKED_URI}}"></script>
  <script src="{{HIGHLIGHT_JS_URI}}"></script>
  <style>{{INLINE_STYLES}}</style>
</head>

<body data-vscode-theme-kind="">
  <script>{{THEME_DETECTION_SCRIPT}}</script>
  <div class="main-container">
    <!-- History Overlay -->
    <div class="history-overlay" id="historyOverlay" onclick="closeHistory(event)">
      <div class="history-panel" onclick="event.stopPropagation()">
        <div class="history-header">
          <h3>📚 Chat History</h3>
          <button class="history-close-btn" onclick="toggleHistory()" title="Close">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M8 8.707l3.646 3.647.708-.707L8.707 8l3.647-3.646-.707-.708L8 7.293 4.354 3.646l-.708.708L7.293 8l-3.647 3.646.708.708L8 8.707z" />
            </svg>
          </button>
        </div>
        <div class="history-search">
          <input type="text" id="historySearch" placeholder="🔍 Search chats..." oninput="filterHistory(this.value)">
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">No chat history yet</div>
        </div>
      </div>
    </div>

    <div class="chat-container">
      <div class="chat-header">
        <div class="chat-header-left">
          <button class="header-btn" onclick="toggleHistory()" title="Chat History">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path d="M8 1a7 7 0 1 0 0 14A7 7 0 0 0 8 1zM0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8z" />
              <path d="M8 3.5a.5.5 0 0 1 .5.5v4H12a.5.5 0 0 1 0 1H8a.5.5 0 0 1-.5-.5V4a.5.5 0 0 1 .5-.5z" />
            </svg>
          </button>
          <h3><span class="header-icon">🐘</span></h3>
          <span class="ai-model-badge" onclick="openAiSettings()" title="Click to configure AI settings"
            id="aiModelBadge">
            <span class="sparkle-icon">✨</span>
            <span id="aiModelName">Loading...</span>
          </span>
        </div>
        <div class="chat-header-right">
          <button class="header-btn" onclick="newChat()" title="New Chat">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z" />
            </svg>
          </button>
          <button class="header-btn" onclick="clearChat()" title="Clear Current Chat">
            <svg viewBox="0 0 16 16" fill="currentColor">
              <path
                d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z" />
              <path fill-rule="evenodd"
                d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1-1-1V2a1 1 0 0 1 1-1H6a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1h3.5a1 1 0 0 1 1 1v1zM4.118 4L4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118zM2.5 3V2h11v1h-11z" />
            </svg>
          </button>
        </div>
      </div>

      <!-- Context Bar showing connection/database -->
      <div class="context-bar" id="contextBar" style="display: none;">
        <span class="context-label">CONTEXT</span>
        <div class="context-item">
          <span class="context-value" id="contextConnection">Local DB 1 • ecommerce_demo</span>
        </div>
        <div class="context-item">
          <span class="context-value badge" id="contextTable">@table</span>
        </div>
      </div>

      <div class="messages-container" id="messagesContainer">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-header">
            <div class="empty-state-title">SQL Assistant</div>
            <div class="empty-state-description">
              Ask about your schema, write queries, or<br />pick a starting point.
            </div>
          </div>
          
          <!-- Quick Action Grid (2x2) -->
          <div class="quick-grid">
            <button class="quick-card" onclick="sendSuggestion('Write a query to...')">
              <div class="quick-card-icon">+</div>
              <div class="quick-card-title">Write a query</div>
              <div class="quick-card-description">Describe what you need</div>
            </button>
            <button class="quick-card" onclick="sendSuggestion('Optimize this query...')">
              <div class="quick-card-icon">⚡</div>
              <div class="quick-card-title">Optimize slow query</div>
              <div class="quick-card-description">Paste query below</div>
            </button>
            <button class="quick-card" onclick="sendSuggestion('Explain...')">
              <div class="quick-card-icon">•</div>
              <div class="quick-card-title">Explain a concept</div>
              <div class="quick-card-description">CTEs, indexes, JOINs...</div>
            </button>
            <button class="quick-card" onclick="sendSuggestion('Review my schema...')">
              <div class="quick-card-icon">⊞</div>
              <div class="quick-card-title">Review my schema</div>
              <div class="quick-card-description">Get design feedback</div>
            </button>
          </div>
          
          <!-- SQL Snippets -->
          <div class="snippets-section">
            <div class="snippets-label">SQL SNIPPETS</div>
            <div class="snippets-grid">
              <button class="snippet-btn" onclick="sendSuggestion('INNER JOIN')">INNER_JOIN</button>
              <button class="snippet-btn" onclick="sendSuggestion('WITH cte AS')">WITH cte AS</button>
              <button class="snippet-btn" onclick="sendSuggestion('ROW_NUMBER()')">ROW_NUMBER()</button>
              <button class="snippet-btn" onclick="sendSuggestion('EXPLAIN ANALYZE')">EXPLAIN ANALYZE</button>
              <button class="snippet-btn" onclick="sendSuggestion('ON CONFLICT')">ON CONFLICT</button>
              <button class="snippet-btn" onclick="sendSuggestion('jsonb_agg')">jsonb_agg</button>
            </div>
          </div>
        </div>
        <div class="typing-indicator" id="typingIndicator">
          <div class="typing-dots">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <div class="loading-text" id="loadingText"></div>
        </div>
      </div>

      <div class="input-wrapper" id="inputWrapper">
        <!-- Suggestion Bubble Strip for AI-suggested next steps -->
        <div class="bubble-strip" id="bubbleStrip" style="display: none;">
          <div class="bubble-strip-header">
            <div class="bubble-strip-label">Next steps:</div>
            <button class="bubble-strip-close-btn" type="button" onclick="dismissBubbleStrip()"
              title="Dismiss next steps" aria-label="Dismiss next steps">
              <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                <path
                  d="M8 8.707l3.646 3.647.708-.707L8.707 8l3.647-3.646-.707-.708L8 7.293 4.354 3.646l-.708.708L7.293 8l-3.647 3.646.708.708L8 8.707z" />
              </svg>
            </button>
          </div>
          <div class="bubble-strip-content" id="bubbleStripContent"></div>
        </div>
        
        <!-- Error Card Template for structured errors -->
        <div class="error-card" id="errorCard" style="display: none;">
          <div class="error-card-header">
            <span class="error-card-icon">⚠️</span>
            <span class="error-card-title" id="errorCardTitle">Error</span>
          </div>
          <div class="error-card-message" id="errorCardMessage"></div>
          <div class="error-card-actions">
            <button class="error-card-btn" onclick="retryLastMessage()" title="Retry the last message">
              🔄 Retry
            </button>
            <button class="error-card-btn" onclick="openAiSettings()" title="Configure AI settings">
              ⚙️ Configure
            </button>
            <button class="error-card-btn" onclick="dismissError()" title="Dismiss error">
              ✕ Dismiss
            </button>
          </div>
        </div>

        <div class="mention-picker" id="mentionPicker">
          <div class="mention-picker-header">
            <span>🔗 Reference DB Object</span>
          </div>
          <div class="mention-breadcrumbs" id="mentionBreadcrumbs"></div>
          <input type="text" class="mention-picker-search" id="mentionSearch"
            placeholder="Search tables, views, functions..." oninput="searchMentions(this.value)"
            onkeydown="handleMentionSearchKeydown(event)">
          <div class="mention-picker-list" id="mentionList">
            <div class="mention-picker-loading">Loading database objects...</div>
          </div>
        </div>
        <div class="input-container">
          <div class="composer-editor">
            <textarea class="chat-input" id="chatInput" placeholder="Ask anything postgres/SQL... (use @ to refer a table/function)" rows="1"
              onkeydown="handleKeyDown(event)" oninput="handleChatInput(event)"></textarea>
          </div>
          <div class="composer-footer">
            <button class="attach-btn" id="attachBtn" onclick="attachFile()"
              title="Attach file (SQL, CSV, JSON, TXT)">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <path
                  d="M11.5 2c1.4 0 2.5 1.1 2.5 2.5v6c0 2.5-2 4.5-4.5 4.5S5 13 5 10.5V4h1v6.5c0 1.9 1.6 3.5 3.5 3.5s3.5-1.6 3.5-3.5v-6c0-.8-.7-1.5-1.5-1.5S10 3.7 10 4.5v6c0 .3.2.5.5.5s.5-.2.5-.5V5h1v5.5c0 .8-.7 1.5-1.5 1.5S9 11.3 9 10.5v-6C9 3.1 10.1 2 11.5 2z" />
              </svg>
            </button>
            <button class="mention-btn" id="mentionBtn" onclick="toggleMentionPicker()"
              title="Reference a database object (@)">@</button>
            <div class="attachments-container" id="attachmentsContainer"></div>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()" title="Send message">
              <span class="send-btn-label">Send</span>
              <span class="send-btn-shortcut">↵</span>
            </button>
            <button class="stop-btn" id="stopBtn" onclick="cancelRequest()" title="Stop generation"
              style="display: none;">
              <svg viewBox="0 0 16 16" fill="currentColor">
                <rect x="3" y="3" width="10" height="10" rx="1" />
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>{{INLINE_SCRIPTS}}</script>
</body>

</html>
